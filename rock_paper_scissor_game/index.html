<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors — Duel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="arena">

    <header class="scoreboard">
      <div class="score-block">
        <span class="score-label">You</span>
        <span class="score-value" id="playerScore">0</span>
      </div>
      <div class="round-label">
        <span>ROUND</span>
        <span id="roundCount">0</span>
      </div>
      <div class="score-block">
        <span class="score-label">Rival</span>
        <span class="score-value" id="cpuScore">0</span>
      </div>
    </header>

    <main class="duel-stage">

      <div class="fighter fighter--player" id="playerFighter">
        <div class="hand" id="playerHand">✊</div>
        <span class="fighter-tag">You</span>
      </div>

      <div class="clash-zone">
        <div class="clash-burst" id="clashBurst"></div>
        <p class="verdict" id="verdict">Choose your move</p>
      </div>

      <div class="fighter fighter--cpu" id="cpuFighter">
        <div class="hand" id="cpuHand">✊</div>
        <span class="fighter-tag">Rival</span>
      </div>

    </main>

    <footer class="controls">
      <p class="controls-label">Throw</p>
      <div class="choices">
        <button class="choice-btn" data-choice="rock" aria-label="Rock">
          <span class="choice-icon">✊</span>
          <span class="choice-name">Rock</span>
        </button>
        <button class="choice-btn" data-choice="paper" aria-label="Paper">
          <span class="choice-icon">✋</span>
          <span class="choice-name">Paper</span>
        </button>
        <button class="choice-btn" data-choice="scissors" aria-label="Scissors">
          <span class="choice-icon">✌️</span>
          <span class="choice-name">Scissors</span>
        </button>
      </div>
      <button class="reset-btn" id="resetBtn">Reset match</button>
    </footer>

  </div>

<script src="script.js"></script>
</body>
</html>
